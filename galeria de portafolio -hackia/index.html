f  <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Galería de portfolio — Proyectos Frontend con JavaScript puro"/>
    <title>Portfolio Gallery</title>
    <link rel="icon" href="xiconcompu.png">
    <link rel="preconnect" href="https://fonts.googleapis.com"/> /<!--Es el servidor que entrega el archivo CSS con las reglas de las fuentes.-->
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/> 
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="styles.css"/>
</head>
<body>

    <!-- ══ HEADER ══ -->
        <header class="site-header">
    <div class="header-left">
        <p class="header-eyebrow">JavaScript Puro · Frontend · Proyectos Comerciales</p>
        <h1 class="header-title">Mi 
            <em>Portfolio</em>
            <br>Galería</h1>
    </div>
        <div class="header-right" aria-hidden="true">
            <span class="count-display" id="countBadge">12</span> <!--que JavaScript utiliza para mostrar el número total de proyectos cargados en tiempo real.-->
            <span class="count-label">proyectos</span>
        </div>
        </header>

        <div class="header-rule" role="separator"></div>
        <!-- ══ TOOLBAR: FILTROS + LIKES TOGGLE  zona de control, filtros  de categoria y interruptor de favoritos══ -->
            <div class="toolbar" role="toolbar" aria-label="Opciones de filtrado">

    <div class="filters" role="group" aria-label="Filtrar por categoría">
        <span class="filter-label">Filtrar</span>
        <button class="filter-btn active" data-filter="all"       aria-pressed="true">Todos         </button>
        <button class="filter-btn"        data-filter="web"       aria-pressed="false">Web App      </button>
        <button class="filter-btn"        data-filter="ecommerce" aria-pressed="false">E-Commerce   </button>
        <button class="filter-btn"        data-filter="landing"   aria-pressed="false">Landing      </button>
        <button class="filter-btn"        data-filter="dashboard" aria-pressed="false">Dashboard    </button>
        <button class="filter-btn"        data-filter="mobile"    aria-pressed="false">Mobile UI    </button>
    </div>

    <button class="liked-toggle" id="likedToggle" aria-pressed="false" title="Ver solo favoritos">
        <svg class="heart-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
        Favoritos
        <span class="liked-count" id="likedCount">0</span>
    </button>

    </div>

        <!-- ══ GALERÍA (el padre) ══ -->
        <main class="gallery" id="gallery" aria-label="Galería de proyectos" aria-live="polite"></main>

    <!-- ══ ESTADO VACÍO ══ -->
        <div class="empty-state" id="emptyState" role="status" aria-live="assertive" hidden>
    <div class="empty-icon" aria-hidden="true">◎</div>
    <p>No hay proyectos en esta categoría</p>
        </div>

        <!-- ══ MODAL DETALLE ══ -->
    <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal" id="modal">

        <div class="modal-header">
        <h2 class="modal-title" id="modalTitle"></h2>
        <button class="modal-close" id="modalClose" aria-label="Cerrar modal">✕</button>
        </div>

        <div class="modal-preview" id="modalPreview" aria-hidden="true"></div>

        <div class="modal-body">
        <p class="modal-desc" id="modalDesc"></p>
        <dl class="modal-meta" id="modalMeta"></dl>
        </div>
    </div>
    </div>

        <script src="script.js"></script>
</body>
</html>
